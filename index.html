<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dario AI</title>

  <style>
    :root {
      color-scheme: dark;
      --background: #050508;
      --foreground: #f5f5f7;
      --green: #39ff14;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: var(--background);
      color: var(--foreground);
      font-family: Geist, Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      pointer-events: none;
      position: fixed;
      inset: 0;
      opacity: 0.045;
      background-image:
        linear-gradient(to right, #ffffff 1px, transparent 1px),
        linear-gradient(to bottom, #ffffff 1px, transparent 1px);
      background-size: 80px 80px;
    }

    body::after {
      content: "";
      pointer-events: none;
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 45%, rgb(57 255 20 / 0.07), transparent 30%),
        radial-gradient(ellipse at center, transparent 30%, rgb(5 5 8 / 0.94) 90%);
    }

    .rings {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .ring {
      position: absolute;
      width: 40vmin;
      height: 40vmin;
      border: 1.5px solid rgb(57 255 20 / 0.55);
      border-radius: 999px;
      opacity: 0;
      transform: scale(0.2);
      animation: ring-pulse 12s linear infinite;
      box-shadow: 0 0 40px rgb(57 255 20 / 0.22);
    }

    .ring:nth-child(1) { animation-delay: 0s; }
    .ring:nth-child(2) { animation-delay: 2s; }
    .ring:nth-child(3) { animation-delay: 4s; }
    .ring:nth-child(4) { animation-delay: 6s; }
    .ring:nth-child(5) { animation-delay: 8s; }
    .ring:nth-child(6) { animation-delay: 10s; }

    @keyframes ring-pulse {
      0% {
        transform: scale(0.2);
        opacity: 0;
      }

      20% {
        opacity: 0.62;
      }

      100% {
        transform: scale(2.25);
        opacity: 0;
      }
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1.25rem, 4vw, 3rem);
      text-align: center;
    }

    .card {
      position: relative;
      width: min(100%, 1050px);
      padding: clamp(2rem, 6vw, 5rem);
      border: 1px solid rgb(255 255 255 / 0.08);
      border-radius: 34px;
      background: transparent;
      box-shadow:
        0 0 0 1px rgb(57 255 20 / 0.06),
        inset 0 1px 0 rgb(255 255 255 / 0.06);
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(
        90deg,
        transparent,
        rgb(57 255 20 / 0.25),
        transparent
      );
      transform: translateX(-100%);
      animation: scan 5.5s ease-in-out infinite;
      opacity: 0.45;
    }

    .card::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 55%;
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(
        90deg,
        transparent,
        rgb(57 255 20 / 0.75),
        transparent
      );
      box-shadow: 0 0 18px rgb(57 255 20 / 0.35);
    }

    @keyframes scan {
      0%, 35% {
        transform: translateX(-120%);
      }

      65%, 100% {
        transform: translateX(120%);
      }
    }

    .content {
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.45rem, 6.5vw, 6.4rem);
      font-weight: 700;
      line-height: 1.02;
      letter-spacing: -0.06em;
      color: var(--green);
      text-wrap: balance;
      text-shadow:
        0 0 5px rgb(57 255 20 / 0.38),
        0 0 16px rgb(57 255 20 / 0.22),
        0 0 34px rgb(57 255 20 / 0.12);
    }

    .subline {
      width: min(100%, 460px);
      height: 1px;
      margin: clamp(1.7rem, 4vw, 2.6rem) auto 0;
      background: linear-gradient(
        90deg,
        transparent,
        rgb(57 255 20 / 0.5),
        transparent
      );
    }

    @media (max-width: 700px) {
      body {
        overflow-x: hidden;
        overflow-y: auto;
      }

      main {
        padding: 1.1rem;
      }

      .card {
        border-radius: 24px;
        padding: 2rem 1.3rem;
      }

      h1 {
        font-size: clamp(2rem, 11vw, 4rem);
      }
    }
  </style>
</head>
<body>
  <div class="rings" aria-hidden="true">
    <span class="ring"></span>
    <span class="ring"></span>
    <span class="ring"></span>
    <span class="ring"></span>
    <span class="ring"></span>
    <span class="ring"></span>
  </div>

  <main>
    <section class="card">
      <div class="content">
        <h1>So much is currently blocking me from developing</h1>
        <div class="subline"></div>
      </div>
    </section>
  </main>
</body>
</html>
